<!DOCTYPE html>
<html>
<head>
    <title>Wond Bingo</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial; }
        body { background: linear-gradient(135deg, #1a2a3a, #0f1a24); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 20px; padding: 20px; position: relative; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h1 { color: #ff416c; }
        .timer { background: #1a2a3a; color: #ffd700; padding: 10px 20px; border-radius: 10px; font-size: 24px; font-weight: bold; }
        .auth-links { position: absolute; top: 20px; right: 20px; display: flex; gap: 10px; }
        .auth-links a { color: white; background: #ff416c; padding: 5px 10px; border-radius: 5px; text-decoration: none; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat { background: #667eea; color: white; padding: 10px; border-radius: 10px; text-align: center; }
        .cards-grid { display: grid; grid-template-columns: repeat(20, 1fr); gap: 3px; max-height: 300px; overflow-y: auto; margin: 20px 0; background: #f0f0f0; padding: 10px; border-radius: 10px; }
        .card-number { aspect-ratio: 1; background: white; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; border-radius: 3px; }
        .card-number.available:hover { background: #4CAF50; color: white; }
        .card-number.selected-by-me { background: #4CAF50 !important; color: white !important; }
        .card-number.selected-by-other { background: #ff4444 !important; color: white !important; cursor: not-allowed; }
        .bingo-card { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 20px 0; }
        .bingo-cell { aspect-ratio: 1; background: white; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; border-radius: 5px; }
        .bingo-cell.called { background: #4CAF50; color: white; }
        .bingo-cell.free { background: #ffd700; }
        .called-numbers { background: #1a2a3a; padding: 15px; border-radius: 10px; margin: 20px 0; min-height: 100px; }
        .called-numbers h3 { color: white; margin-bottom: 10px; }
        .called-number { display: inline-block; width: 40px; height: 40px; background: #333; color: white; border-radius: 50%; text-align: center; line-height: 40px; margin: 5px; border: 2px solid #ffd700; font-weight: bold; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-top: 20px; }
        button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-primary { background: #4CAF50; color: white; }
        .btn-primary:hover { background: #45a049; }
        .btn-bingo { background: #ff416c; color: white; }
        .btn-bingo:hover { background: #ff4b2b; }
        .btn-bingo:disabled { background: #ccc; cursor: not-allowed; }
        .login-prompt { text-align: center; padding: 40px; background: #f8f9fa; border-radius: 10px; margin: 20px 0; }
        .game-status { text-align: center; padding: 10px; margin: 10px 0; border-radius: 5px; font-weight: bold; }
        .status-waiting { background: #fff3cd; color: #856404; }
        .status-running { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Auth Links -->
        <div class="auth-links">
            <a href="/login" id="loginLink">Login</a>
            <a href="/register" id="registerLink">Register</a>
            <a href="/profile" id="profileLink" style="display: none;">Profile</a>
            <a href="/logout" id="logoutLink" style="display: none;">Logout</a>
            <a href="/admin" id="adminLink" style="display: none;">Admin</a>
        </div>

        <!-- Header -->
        <div class="header">
            <h1>🎰 Wond Bingo</h1>
            <div class="timer" id="timer">00:20</div>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat">Round: <span id="roundNum">1</span></div>
            <div class="stat">Cards Left: <span id="cardsLeft">400</span></div>
        </div>

        <!-- Game Status -->
        <div id="gameStatus" class="game-status status-waiting">
            ⏳ Waiting for round to start... Select a card and click "Join Game"
        </div>

        <!-- Login Prompt -->
        <div id="loginPrompt" class="login-prompt">
            <h3>🔒 Welcome to Wond Bingo!</h3>
            <p>Please <a href="/login">login</a> or <a href="/register">register</a> to play.</p>
            <p style="margin-top: 10px;">Demo: <strong>admin</strong> / <strong>admin123</strong></p>
        </div>

        <!-- Game Content -->
        <div id="gameContent" style="display: none;">
            <h3>Select Card (1-400)</h3>
            <div class="cards-grid" id="cardsGrid"></div>

            <h3>Your Card</h3>
            <div class="bingo-card" id="playerCard"></div>
        </div>

        <!-- Called Numbers -->
        <div class="called-numbers">
            <h3>📞 Called Numbers</h3>
            <div id="calledNumbers"></div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn-primary" onclick="selectRandomCard()" id="randomBtn">Random Card</button>
            <button class="btn-primary" onclick="joinGame()" id="joinBtn">Join Game</button>
            <button class="btn-bingo" onclick="claimBingo()" id="bingoBtn" disabled>BINGO!</button>
        </div>
    </div>

    <script>
        let socket = io();
        let currentUser = localStorage.getItem('userId') || 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('userId', currentUser);
        
        let selectedCard = null;
        let selectedByOthers = new Set();
        let calledNumbers = [];
        let isLoggedIn = false;
        let gameRunning = false;
        let timerSeconds = 20;
        let currentRound = 1;

        // Check login status
        function checkLogin() {
            fetch('/api/balance')
                .then(response => {
                    if (response.ok) return response.json();
                    throw new Error('Not logged in');
                })
                .then(data => {
                    isLoggedIn = true;
                    document.getElementById('loginPrompt').style.display = 'none';
                    document.getElementById('gameContent').style.display = 'block';
                    document.getElementById('loginLink').style.display = 'none';
                    document.getElementById('registerLink').style.display = 'none';
                    document.getElementById('profileLink').style.display = 'inline';
                    document.getElementById('logoutLink').style.display = 'inline';
                    
                    if (data.username === 'admin') {
                        document.getElementById('adminLink').style.display = 'inline';
                    }
                    
                    // Request game state
                    socket.emit('get_state');
                })
                .catch(() => {
                    isLoggedIn = false;
                    document.getElementById('loginPrompt').style.display = 'block';
                    document.getElementById('gameContent').style.display = 'none';
                    document.getElementById('loginLink').style.display = 'inline';
                    document.getElementById('registerLink').style.display = 'inline';
                    document.getElementById('profileLink').style.display = 'none';
                    document.getElementById('logoutLink').style.display = 'none';
                    document.getElementById('adminLink').style.display = 'none';
                });
        }

        // Generate cards
        for(let i = 1; i <= 400; i++) {
            $('#cardsGrid').append(`<div class="card-number available" id="card-${i}" onclick="selectCard(${i})">${i}</div>`);
        }

        // Socket events
        socket.on('connect', function() {
            socket.emit('identify', { userId: currentUser });
            checkLogin();
        });

        socket.on('card_selected', function(data) {
            if(data.userId !== currentUser) {
                $(`#card-${data.cardNumber}`).removeClass('available selected-by-me').addClass('selected-by-other');
                selectedByOthers.add(data.cardNumber);
                updateCardsLeft();
            }
        });

        socket.on('card_released', function(data) {
            $(`#card-${data.cardNumber}`).removeClass('selected-by-other').addClass('available');
            selectedByOthers.delete(data.cardNumber);
            updateCardsLeft();
        });

        socket.on('number_drawn', function(data) {
            calledNumbers.push(data.number);
            $('#calledNumbers').append(`<span class="called-number">${data.number}</span>`);
            markCardNumber(data.number);
            gameRunning = true;
            updateGameStatus();
        });

        socket.on('game_joined', function(data) {
            renderCard(data.card);
            $('#bingoBtn').prop('disabled', false);
            $('#joinBtn').prop('disabled', true);
            alert('✅ Joined game! Game will start when timer reaches 0');
        });

        socket.on('claim_result', function(data) {
            if(data.result === 'VALID') alert('🎉 BINGO! You won!');
            else if(data.result === 'DISQUALIFIED') alert('❌ Invalid claim - Disqualified!');
            else alert('Claim rejected');
        });

        socket.on('game_state', function(data) {
            if(data.round) currentRound = data.round;
            document.getElementById('roundNum').textContent = currentRound;
            
            if(data.drawn && data.drawn.length > 0) {
                calledNumbers = data.drawn;
                $('#calledNumbers').empty();
                calledNumbers.forEach(num => {
                    $('#calledNumbers').append(`<span class="called-number">${num}</span>`);
                });
                gameRunning = true;
            }
            
            if(data.card) {
                renderCard(data.card);
                if(data.in_game) {
                    $('#bingoBtn').prop('disabled', data.disqualified);
                    $('#joinBtn').prop('disabled', true);
                }
            }
            
            updateGameStatus();
        });

        socket.on('round_started', function(data) {
            currentRound = data.round;
            document.getElementById('roundNum').textContent = currentRound;
            calledNumbers = [];
            $('#calledNumbers').empty();
            gameRunning = true;
            timerSeconds = 20;
            updateGameStatus();
        });

        // Functions
        function selectCard(num) {
            if(!isLoggedIn) { alert('Login first!'); window.location.href='/login'; return; }
            if(gameRunning) { alert('Game already started! Wait for next round.'); return; }
            if(selectedByOthers.has(num)) { alert('Card taken!'); return; }
            
            if(selectedCard) {
                $(`#card-${selectedCard}`).removeClass('selected-by-me').addClass('available');
                socket.emit('release_card', { cardNumber: selectedCard });
            }
            
            $(`#card-${num}`).removeClass('available').addClass('selected-by-me');
            selectedCard = num;
            socket.emit('select_card', { cardNumber: num, userId: currentUser });
            updateCardsLeft();
        }

        function selectRandomCard() {
            if(!isLoggedIn) { alert('Login first!'); return; }
            if(gameRunning) { alert('Game already started!'); return; }
            
            let available = [];
            for(let i=1; i<=400; i++) {
                if(!selectedByOthers.has(i) && i !== selectedCard) available.push(i);
            }
            if(available.length) selectCard(available[Math.floor(Math.random()*available.length)]);
        }

        function joinGame() {
            if(!isLoggedIn) { alert('Login first!'); return; }
            if(!selectedCard) { alert('Select a card first!'); return; }
            
            $.ajax({
                url: '/api/join_game',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({cardNumber: selectedCard}),
                success: function(res) {
                    if(res.success) {
                        renderCard(res.card);
                        $('#bingoBtn').prop('disabled', false);
                        $('#joinBtn').prop('disabled', true);
                    } else {
                        alert(res.message);
                    }
                }
            });
        }

        function claimBingo() {
            if(!isLoggedIn) { alert('Login first!'); return; }
            if(confirm('Are you sure you have BINGO?')) {
                socket.emit('claim_bingo');
            }
        }

        function renderCard(card) {
            $('#playerCard').empty();
            for(let row=0; row<5; row++) {
                for(let col=0; col<5; col++) {
                    let val = card[row][col];
                    let cls = 'bingo-cell';
                    if(val === 'FREE') cls += ' free';
                    else if(calledNumbers.includes(parseInt(val))) cls += ' called';
                    $('#playerCard').append(`<div class="${cls}">${val}</div>`);
                }
            }
        }

        function markCardNumber(num) {
            $(`#playerCard .bingo-cell:contains(${num})`).addClass('called');
        }

        function updateCardsLeft() {
            let available = 400 - selectedByOthers.size;
            if(selectedCard) available--;
            $('#cardsLeft').text(available);
        }

        function updateGameStatus() {
            let statusDiv = document.getElementById('gameStatus');
            if(gameRunning) {
                statusDiv.className = 'game-status status-running';
                statusDiv.innerHTML = '🎲 Game in progress - Numbers being called!';
            } else {
                statusDiv.className = 'game-status status-waiting';
                statusDiv.innerHTML = '⏳ Waiting for next round to start... Select a card and click "Join Game"';
            }
        }

        // Timer countdown
        setInterval(() => {
            if(timerSeconds > 0) {
                timerSeconds--;
                let mins = Math.floor(timerSeconds / 60);
                let secs = timerSeconds % 60;
                $('#timer').text(`${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`);
            }
        }, 1000);

        // Auto-start game when timer reaches 0
        setInterval(() => {
            if(timerSeconds === 0 && !gameRunning) {
                gameRunning = true;
                updateGameStatus();
            }
        }, 1000);

        checkLogin();
    </script>
</body>
</html>
